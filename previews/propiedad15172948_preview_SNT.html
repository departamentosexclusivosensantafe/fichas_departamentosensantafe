<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Departamento en renta enfrente de Garden Santa Fe</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Departamento en renta enfrente de Garden Santa Fe" />
<meta property="og:description" content="Salón de eventos, jardín con juegos para niños y seguridad 24hrs." />
<meta property="og:image" content="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg" />
<meta property="og:url" content="https://departamentosexclusivosensantafe.github.io/fichas/previews/propiedad15172948_preview.html" />
<meta property="og:type" content="website" />

</head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div>
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg" alt="Departamento en renta enfrente de Garden Santa Fe" />
      </div>

      <div>
        <h1 class="property__title">Departamento en renta enfrente de Garden Santa Fe</h1>
        <p class="property__price">40,000.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">125 m2</li><li class="property__feature">2 patios</li><li class="property__feature">Cuarto de servicio con baño</li><li class="property__feature">2 estacionamiento</li><li class="property__feature">1 bodega</li><li class="property__feature"></li>
        </ul>
      </div>

      <div>
        <p class="property__description">Salón de eventos, jardín con juegos para niños y seguridad 24hrs.</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_1.jpeg" alt="Departamento en renta enfrente de Garden Santa Fe">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">Gonzales Camarena 900, Santa Fe</p>
        <a
        href="https://www.google.com/maps?q=Gonzales%20Camarena%20900%2C%20Santa%20Fe"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_12.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_13.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_14.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_15.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_16.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_17.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp15_18.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });
  })();

</script>

</body>
</html>
